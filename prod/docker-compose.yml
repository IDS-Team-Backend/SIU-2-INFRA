# Stack SIU PROD (frontend + api + mysql) detras de Traefik.
#
#   cd prod && docker compose up -d
#
# Autocontenido: todo lo estructural (nombres, hosts, dockerfile, restart) esta
# explicito aca. El .env de esta carpeta solo lleva config/secretos que se
# inyectan dentro de los contenedores. Compose levanta .env solo, sin -f ni --env-file.

name: siu

services:

  frontend:
    container_name: frontend-siu-prod
    restart: unless-stopped
    build:
      context: ../../SIU-2-FRONTEND/frontend/
      dockerfile: ./Dockerfile
    env_file:
      - .env
    environment:
      - SECRET_KEY=${FRONTEND_SECRET_KEY}
    expose:
      - "5000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=net-nammu"
      - "traefik.http.routers.frontend-siu-prod.rule=Host(`siu.vargastomas.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.frontend-siu-prod.entrypoints=websecure"
      - "traefik.http.routers.frontend-siu-prod.tls=true"
      - "traefik.http.routers.frontend-siu-prod.tls.certresolver=myresolver"
      - "traefik.http.routers.frontend-siu-prod.priority=10"
      - "traefik.http.routers.frontend-siu-prod.service=frontend-siu-prod"
      - "traefik.http.services.frontend-siu-prod.loadbalancer.server.port=5000"
    networks:
      - traefik

  api:
    container_name: api-siu-prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    build:
      context: ../../SIU-2-BACKEND/
      dockerfile: ./Dockerfile
    env_file:
      - .env
    expose:
      - "5000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=net-nammu"
      - "traefik.http.routers.api-siu-prod.rule=Host(`siu.api.vargastomas.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.api-siu-prod.entrypoints=websecure"
      - "traefik.http.routers.api-siu-prod.tls=true"
      - "traefik.http.routers.api-siu-prod.tls.certresolver=myresolver"
      - "traefik.http.routers.api-siu-prod.priority=10"
      - "traefik.http.routers.api-siu-prod.service=api-siu-prod"
      - "traefik.http.services.api-siu-prod.loadbalancer.server.port=5000"
    networks:
      - traefik

  mysql:
    container_name: mysql-siu-prod
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mysql-siu-data:/var/lib/mysql
      - ../../mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "3306"
    networks:
      - traefik


volumes:
  mysql-siu-data:

networks:
  # Red externa de Traefik (compartida con dev).
  traefik:
    external: true
    name: net-nammu
