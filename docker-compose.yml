# Stack SIU (frontend + api + mysql) detras de Traefik.
#
# Todo lo que cambia entre entornos vive en un archivo .env.<entorno> (ver .env.example):
#   PROD: docker compose --env-file .env.prod up -d
#   DEV : docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up -d
#
# Como dev y prod conviven en la misma maquina, cada entorno es su propio proyecto
# Docker (PROJECT_NAME) con su propia MySQL; comparten solo la red externa de Traefik.

name: ${PROJECT_NAME:-siu}

services:

  frontend:
    container_name: frontend-siu-${STACK_ENV:-prod}
    restart: ${RESTART_POLICY:-unless-stopped}
    build:
      context: ${PROJECT_ROOT}/SIU-2-FRONTEND/frontend/
      dockerfile: ${FRONTEND_DOCKERFILE:-./Dockerfile}
    env_file:
      - ${ENV_FILE}
    environment:
      - SECRET_KEY=${FRONTEND_SECRET_KEY}
    expose:
      - "5000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.frontend-siu-${STACK_ENV}.rule=Host(`${FRONTEND_HOST}`) && PathPrefix(`/`)"
      - "traefik.http.routers.frontend-siu-${STACK_ENV}.entrypoints=websecure"
      - "traefik.http.routers.frontend-siu-${STACK_ENV}.tls=true"
      - "traefik.http.routers.frontend-siu-${STACK_ENV}.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.routers.frontend-siu-${STACK_ENV}.priority=1"
      - "traefik.http.routers.frontend-siu-${STACK_ENV}.service=frontend-siu-${STACK_ENV}"
      - "traefik.http.services.frontend-siu-${STACK_ENV}.loadbalancer.server.port=5000"
    networks:
      - traefik

  api:
    container_name: api-siu-${STACK_ENV:-prod}
    restart: ${RESTART_POLICY:-unless-stopped}
    depends_on:
      mysql:
        condition: service_healthy
    build:
      context: ${PROJECT_ROOT}/SIU-2-BACKEND/
      dockerfile: ${API_DOCKERFILE:-./Dockerfile}
    env_file:
      - ${ENV_FILE}
    expose:
      - "5000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK}"
      - "traefik.http.routers.api-siu-${STACK_ENV}.rule=Host(`${API_HOST}`) && PathPrefix(`/`)"
      - "traefik.http.routers.api-siu-${STACK_ENV}.entrypoints=websecure"
      - "traefik.http.routers.api-siu-${STACK_ENV}.tls=true"
      - "traefik.http.routers.api-siu-${STACK_ENV}.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.routers.api-siu-${STACK_ENV}.priority=1"
      - "traefik.http.routers.api-siu-${STACK_ENV}.service=api-siu-${STACK_ENV}"
      - "traefik.http.services.api-siu-${STACK_ENV}.loadbalancer.server.port=5000"
    networks:
      - traefik

  mysql:
    container_name: mysql-siu-${STACK_ENV:-prod}
    image: mysql:8.0
    restart: ${RESTART_POLICY:-unless-stopped}
    env_file:
      - ${ENV_FILE}
    volumes:
      - mysql-siu-data:/var/lib/mysql
      - ${PROJECT_ROOT}/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    expose:
      - "3306"
    networks:
      - traefik


volumes:
  mysql-siu-data:

networks:
  # Red externa de Traefik. El nombre real lo define ${TRAEFIK_NETWORK};
  # dentro del compose la referenciamos como `traefik`.
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK}
